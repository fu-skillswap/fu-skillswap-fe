<svg width="520" height="480" viewBox="0 0 520 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trao đổi kỹ năng">
  <defs>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eafff4"/>
    </linearGradient>
  </defs>

  <!-- soft background blobs -->
  <circle cx="110" cy="100" r="70" fill="#ffffff" opacity="0.10"/>
  <circle cx="430" cy="380" r="90" fill="#ffffff" opacity="0.08"/>
  <circle cx="450" cy="90" r="26" fill="#ffffff" opacity="0.14"/>

  <!-- dashed swap orbit -->
  <ellipse cx="260" cy="250" rx="178" ry="120" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="3 10"/>

  <!-- left person bubble -->
  <g>
    <circle cx="120" cy="250" r="52" fill="#ffffff" opacity="0.95"/>
    <circle cx="120" cy="234" r="17" fill="#3b82f6"/>
    <path d="M96 280c0-15 11-26 24-26s24 11 24 26z" fill="#3b82f6"/>
  </g>
  <!-- right person bubble -->
  <g>
    <circle cx="400" cy="250" r="52" fill="#ffffff" opacity="0.95"/>
    <circle cx="400" cy="234" r="17" fill="#10b981"/>
    <path d="M376 280c0-15 11-26 24-26s24 11 24 26z" fill="#10b981"/>
  </g>

  <!-- swap arrows in the middle -->
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M196 226h120"/><path d="M300 210l18 16-18 16"/>
    <path d="M324 286H204"/><path d="M220 270l-18 16 18 16"/>
  </g>

  <!-- skill card: code -->
  <g transform="rotate(-8 230 120)">
    <rect x="178" y="78" width="104" height="74" rx="14" fill="url(#cardA)"/>
    <rect x="178" y="78" width="104" height="22" rx="11" fill="#3b82f6"/>
    <g stroke="#3b82f6" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M205 124l-12 9 12 9"/><path d="M255 124l12 9-12 9"/>
    </g>
    <line x1="228" y1="120" x2="234" y2="146" stroke="#93c5fd" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- skill card: design -->
  <g transform="rotate(9 330 370)">
    <rect x="286" y="332" width="104" height="74" rx="14" fill="url(#cardB)"/>
    <rect x="286" y="332" width="104" height="22" rx="11" fill="#10b981"/>
    <circle cx="318" cy="378" r="13" fill="#a7f3d0"/>
    <rect x="340" y="368" width="34" height="8" rx="4" fill="#34d399"/>
    <rect x="340" y="383" width="22" height="8" rx="4" fill="#6ee7b7"/>
  </g>

  <!-- graduation cap -->
  <g transform="translate(252 348)">
    <path d="M0 14l40-16 40 16-40 16z" fill="#ffffff"/>
    <path d="M16 22v18c0 7 11 12 24 12s24-5 24-12V22" fill="#fbbf24"/>
    <line x1="72" y1="18" x2="72" y2="40" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="72" cy="42" r="4" fill="#ffffff"/>
  </g>

  <!-- sparkles -->
  <g fill="#fde68a">
    <path d="M150 150l4 10 10 4-10 4-4 10-4-10-10-4 10-4z"/>
    <path d="M392 150l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
  </g>
  <circle cx="262" cy="120" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="262" cy="392" r="4" fill="#ffffff" opacity="0.8"/>
</svg>
