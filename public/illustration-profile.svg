<svg width="520" height="480" viewBox="0 0 520 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hồ sơ học thuật">
  <defs>
    <linearGradient id="pCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
  </defs>

  <!-- soft blobs -->
  <circle cx="100" cy="120" r="74" fill="#ffffff" opacity="0.10"/>
  <circle cx="430" cy="370" r="88" fill="#ffffff" opacity="0.08"/>
  <circle cx="448" cy="110" r="22" fill="#ffffff" opacity="0.14"/>

  <!-- main profile card -->
  <g transform="translate(150 110)">
    <rect x="0" y="0" width="220" height="270" rx="22" fill="url(#pCard)"/>
    <!-- header band -->
    <path d="M0 22a22 22 0 0 1 22-22h176a22 22 0 0 1 22 22v44H0z" fill="#3b82f6"/>
    <!-- avatar -->
    <circle cx="110" cy="78" r="34" fill="#ffffff"/>
    <circle cx="110" cy="68" r="14" fill="#10b981"/>
    <path d="M88 102c0-13 10-23 22-23s22 10 22 23z" fill="#10b981"/>
    <!-- name + role lines -->
    <rect x="62" y="124" width="96" height="12" rx="6" fill="#1e3a8a"/>
    <rect x="78" y="146" width="64" height="9" rx="4.5" fill="#93c5fd"/>
    <!-- info rows -->
    <g>
      <rect x="28" y="176" width="14" height="14" rx="4" fill="#bfdbfe"/>
      <rect x="52" y="178" width="140" height="10" rx="5" fill="#dbeafe"/>
      <rect x="28" y="204" width="14" height="14" rx="4" fill="#a7f3d0"/>
      <rect x="52" y="206" width="120" height="10" rx="5" fill="#d1fae5"/>
      <rect x="28" y="232" width="14" height="14" rx="4" fill="#fde68a"/>
      <rect x="52" y="234" width="100" height="10" rx="5" fill="#fef3c7"/>
    </g>
  </g>

  <!-- graduation cap badge -->
  <g transform="translate(96 250)">
    <circle cx="40" cy="40" r="44" fill="#ffffff" opacity="0.95"/>
    <path d="M8 36l32-13 32 13-32 13z" fill="#1e3a8a"/>
    <path d="M22 44v14c0 6 8 10 18 10s18-4 18-10V44" fill="#fbbf24"/>
    <line x1="63" y1="40" x2="63" y2="58" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
    <circle cx="63" cy="60" r="3.5" fill="#1e3a8a"/>
  </g>

  <!-- checklist / verified badge -->
  <g transform="translate(360 250)">
    <circle cx="40" cy="40" r="44" fill="#ffffff" opacity="0.95"/>
    <circle cx="40" cy="40" r="26" fill="#10b981"/>
    <path d="M29 41l8 8 15-16" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- books -->
  <g transform="translate(348 138)">
    <rect x="0" y="0" width="60" height="14" rx="3" fill="#60a5fa"/>
    <rect x="6" y="14" width="60" height="14" rx="3" fill="#34d399"/>
    <rect x="2" y="28" width="60" height="14" rx="3" fill="#fbbf24"/>
  </g>

  <!-- sparkles -->
  <g fill="#fde68a">
    <path d="M120 150l4 10 10 4-10 4-4 10-4-10-10-4 10-4z"/>
    <path d="M398 150l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/>
  </g>
</svg>
